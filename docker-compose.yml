services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: urie
      POSTGRES_PASSWORD: urie
      POSTGRES_DB: urie
    ports:
      - "5432:5432"
    volumes:
      - urie_pgdata:/var/lib/postgresql/data
      - ./scripts/init_app_role.sql:/docker-entrypoint-initdb.d/01_init_app_role.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urie -d urie"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  urie_pgdata:
